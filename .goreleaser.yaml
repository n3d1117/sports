version: 2

project_name: sports

before:
  hooks:
    - go test ./...

builds:
  - id: sports
    main: ./cmd/sports
    binary: sports
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X sports/internal/buildinfo.Version={{ .Version }}
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
  - id: sports-mcp
    main: ./cmd/sports-mcp
    binary: sports-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X sports/internal/buildinfo.Version={{ .Version }}
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: sports
    ids:
      - sports
      - sports-mcp
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  use: git

release:
  draft: false
  prerelease: auto
